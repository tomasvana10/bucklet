name: Publish to PyPI

# Publishes to PyPI when a GitHub release is published. Uses trusted publishing
# (OIDC), so there is no API token to manage: configure bucklet as a trusted
# publisher on PyPI and add a "pypi" environment to this repo.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@v1.14.0
